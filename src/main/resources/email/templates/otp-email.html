<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="margin:0; padding:0; background-color:#f5f5f5; font-family:Arial, sans-serif;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f5f5f5; padding:24px 0;">
    <tr>
        <td align="center">
            <table role="presentation" width="600" cellspacing="0" cellpadding="0"
                   style="background-color:#ffffff; border-radius:8px; padding:32px;">
                <tr>
                    <td align="center">
                        <p style="margin:0 0 12px; color:#555555; font-size:15px;">
                        </p>
                        <p style="margin:0 0 24px; color:#555555; font-size:15px;">
                            Your OTP for <span th:text="${purpose}"></span> is
                        </p>

                        <div style="display:inline-block; padding:14px 24px; border-radius:6px; background-color:#f0f4ff;
                        font-size:28px; font-weight:bold; letter-spacing:6px; color:#1a1a1a; margin-bottom:24px;"
                             th:text="${otp}">

                        </div>

                        <p style="margin:24px 0 8px; color:#555555; font-size:14px;">
                            This code will expire in <span th:text="${expiry}"></span> minutes.
                        </p>

                        <p style="margin:0; color:#888888; font-size:13px;">
                            If you did not request this, please ignore this email.
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
